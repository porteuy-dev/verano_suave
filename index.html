<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Colorimetry Pro | TONO APROBADO</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0A0A0A; --txt: #FFFFFF; --accent: #0047FF; 
            --card-bg: #F8F9FA; --border: #E5E5E5;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body, html { 
            margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
            background: var(--bg); color: var(--txt); 
            min-height: 100dvh; overflow-x: hidden; 
        }

        /* --- HOME PAGE (LANDING) --- */
/* --- HOME PAGE (LANDING) MODIFICADA --- */
#landing { 
    height: 100dvh; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; /* Juntamos todo al centro */
    align-items: center; 
    text-align: center; 
    padding: 40px 24px;
    gap: 20px; /* Controlamos la distancia exacta entre elementos */
        }
        .brand { 
            font-family: 'Syne'; font-size: 0.85rem; letter-spacing: 5px; 
            color: #888; text-transform: uppercase; margin-top: 20px;
        }
.hero-text { 
    /* Eliminamos flex-grow: 1 para que no empuje al botón al fondo */
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    margin-bottom: 10px; /* Un pequeño ajuste extra de aire */
}
        .main-title { 
            font-family: 'Syne'; font-size: clamp(2.8rem, 12vw, 4.5rem); 
            line-height: 0.95; margin: 0; text-transform: uppercase; 
            letter-spacing: -2px;
        }
        .btn-enter { 
            background: #fff; color: #000; padding: 20px 0; width: 100%; max-width: 320px;
            border: none; font-family: 'Syne'; font-weight: 800; text-transform: uppercase; 
            cursor: pointer; border-radius: 100px; font-size: 1.1rem; 
            box-shadow: 0 10px 30px rgba(255,255,255,0.1); transition: 0.3s;
        }

        /* --- GRID VIEW --- */
        #grid-view { display: none; background: #fff; color: #111; min-height: 100vh; padding-bottom: 80px; }
        .header { 
            position: sticky; top: 0; background: rgba(255,255,255,0.9); 
            backdrop-filter: blur(10px); z-index: 100; padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border);
        }
        .btn-back { 
            background: none; border: 1.5px solid #111; padding: 8px 16px; 
            border-radius: 100px; font-weight: 700; font-size: 0.75rem; cursor: pointer; 
        }
        .header-name { font-family: 'Syne'; font-weight: 800; font-size: 0.9rem; text-transform: uppercase; }

        .content { max-width: 600px; margin: 0 auto; padding: 20px; }
        .cat-title { 
            font-family: 'Syne'; font-size: 1.25rem; font-weight: 800; 
            text-transform: uppercase; margin: 45px 0 15px; color: var(--accent);
        }
        .sub-group-title { 
            font-size: 0.7rem; font-weight: 700; color: #999; 
            text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.5px;
        }
        
        .grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 12px; margin-bottom: 35px; 
        }
        .color-box { 
            aspect-ratio: 1; border-radius: 12px; cursor: pointer; 
            border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        /* --- VIEWER SLIDER --- */
        #viewer { 
            position: fixed; inset: 0; z-index: 1000; display: none; 
            flex-direction: column; background: #000; 
        }
        #v-color { 
            flex: 1; width: 100%; display: flex; align-items: center; 
            justify-content: center; position: relative; touch-action: none; 
        }
        .v-close { 
            position: absolute; top: 40px; right: 20px; background: #fff; 
            border: none; width: 44px; height: 44px; border-radius: 50%; 
            font-size: 1.2rem; font-weight: bold; cursor: pointer; z-index: 1010; 
        }
        .v-info { 
            background: #fff; color: #000; padding: 40px 24px; 
            text-align: center; border-radius: 32px 32px 0 0;
        }
        .v-info h3 { margin: 0; font-family: 'Syne'; font-size: 1.5rem; text-transform: uppercase; }
        .v-info p { margin: 8px 0 15px; color: #888; font-weight: 600; font-size: 0.9rem; }
        .v-swipe-hint { font-size: 0.65rem; color: #CCC; text-transform: uppercase; letter-spacing: 1px; }

        .footer-legal { font-size: 0.65rem; text-align: center; padding: 40px 20px; opacity: 0.5; color: #666; line-height: 1.6; }
    </style>
</head>
<body>

    <section id="landing">
        <div class="brand">TONO APROBADO</div>
        <div class="hero-text">
            <h1 class="main-title" id="display-title">Estación</h1>
        </div>
        <button class="btn-enter" onclick="openGrid()">Ver Paleta Completa</button>
    </section>

    <section id="grid-view">
        <div class="header">
            <button class="btn-back" onclick="location.reload()">VOLVER</button>
            <div class="header-name" id="header-name">Estación</div>
        </div>
        <div class="content" id="main-content"></div>
        <div class="footer-legal">
            &copy; 2026 TONO APROBADO. El contenido de esta guía está protegido. Prohibida su venta o distribución no autorizada.
        </div>
    </section>

    <div id="viewer">
        <button class="v-close" onclick="closeViewer()">✕</button>
        <div id="v-color"></div>
        <div class="v-info">
            <h3 id="v-name">Color</h3>
            <p id="v-hex">#000000</p>
            <div class="v-swipe-hint">← Desliza para navegar →</div>
        </div>
    </div>

    <script>
        // DATOS DE EJEMPLO: REEMPLAZA ESTO EN CADA ARCHIVO
        const data = {
                name:"Verano Suave",
                title: "Verano<br>Suave",
                star: "Neutros fríos suaves|#E3E8EC:Soft Cool White,#C4C6CC:Cool Soft Gray,#8A8A8F:Muted Cool Gray,#CFD2E3:Soft Blue Gray;Rosas y Malvas|#EFE1E2:Powder Blush,#E3A9BC:Soft Dusty Rose,#C36581:Muted Rose,#C85C7A:Soft Cool Raspberry,#E0C9DC:Soft Mauve,#BFB9D4:Dusty Lilac,#A68EBE:Muted Lavender,#7A5C97:Soft Plum;Azules y Verdes|#D3DEEA:Powder Blue,#7F92AA:Soft Denim,#5F93AA:Muted Blue,#44495F:Cool Soft Navy,#C2DEDE:Soft Aqua,#A8BEB7:Sage Green,#4E7472:Muted Teal,#2F5752:Soft Deep Green",
                comp: "Complementarios|#EEEFF2:C1,#E2E3E8:C2,#D5D7DE:C3,#C7CAD3:C4,#BABDC8:C5,#E9E1E7:C6,#DCCFD9:C7,#CDBCCB:C8,#BFA9BD:C9,#B196AF:C10,#D8D2E0:C11,#C6C0D1:C12,#B4AFC2:C13,#A29EB3:C14,#918DA5:C15,#D5E0E0:C16,#C2D1D1:C17,#AFC3C3:C18,#9CB5B5:C19,#8AA7A7:C20,#CCD4CF:C21,#B8C4BE:C22,#A4B5AE:C23,#91A69F:C24,#7E9790:C25,#C1C4CC:C26,#ADB1BC:C27,#989EAC:C28,#848A9C:C29,#70768C:C30",
                avoid: "Cálidos / Dorados|#FF8C00:Orange,#FFD634:Warm Yellow,#C1672F:Camel;Muy Oscuros|#000000:Black,#1A1A1A:Ink Black;Muy Saturados|#FF0000:True Red,#EB19B3:Hot Fuchsia,#00FF00:Neon Green",
                metal: "Recomendados|#C0C0C0:Silver,#EAEAEA:White Gold,#E5E4E2:Platinum,#ADB1B8:Soft Pewter;Evitar|#FFD700:Yellow Gold,#B87333:Copper,#CD7F32:Bronze,#B76E79:Rose Gold",
        };

        let allCols = []; let curIdx = 0; let touchStartX = 0;

        function init() {
            document.getElementById('display-title').innerHTML = data.title;
            document.getElementById('header-name').innerText = data.name;
            render("Colores Estrella", data.star);
            render("Complementarios", data.comp);
            render("Evitar", data.avoid);
            render("Metales", data.metal);
        }

        function render(cat, raw) {
            let h = `<div class="cat-title">${cat}</div>`;
            raw.split(';').forEach(g => {
                const [title, colors] = g.split('|');
                h += `<div class="sub-group-title">${title}</div><div class="grid">`;
                colors.split(',').forEach(c => {
                    const [hex, nm] = c.split(':');
                    allCols.push({hex, nm});
                    const idx = allCols.length - 1;
                    h += `<div class="color-box" style="background:${hex}" onclick="openViewer(${idx})"></div>`;
                });
                h += `</div>`;
            });
            document.getElementById('main-content').innerHTML += h;
        }

        function openGrid() { 
            document.getElementById('landing').style.display = 'none';
            document.getElementById('grid-view').style.display = 'block';
            window.scrollTo(0,0);
        }

        function openViewer(i) { 
            curIdx = i; updateV(); 
            document.getElementById('viewer').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function updateV() {
            const c = allCols[curIdx];
            document.getElementById('v-color').style.backgroundColor = c.hex;
            document.getElementById('v-name').innerText = c.nm;
            document.getElementById('v-hex').innerText = c.hex;
        }

        function closeViewer() { 
            document.getElementById('viewer').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // SWIPE LOGIC
        const vArea = document.getElementById('v-color');
        vArea.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX, false);
        vArea.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].clientX;
            let diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) curIdx = (curIdx + 1) % allCols.length;
                else curIdx = (curIdx - 1 + allCols.length) % allCols.length;
                updateV();
            }
        }, false);

        init();
    </script>
</body>
</html>
